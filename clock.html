<!DOCTYPE html>
<html>
<head>
<title>Digital Clock</title>
<style>
body{
background:black;
color:lime;
text-align:center;
font-family:Arial;
margin-top:150px;
}

#clock{
font-size:50px;
font-weight:bold;
}
</style>
</head>
<body>

<h1>Digital Clock</h1>

<div id="clock"></div>

<script>
function showTime(){
let date = new Date();

let time = date.toLocaleTimeString();

document.getElementById("clock").innerHTML = time;
}

setInterval(showTime,1000);

showTime();
</script>

</body>
</html>
